  A synthetic high-dollar claims review should not move toward internal eval
  or downstream handoff until the contract/rate source pointer identifies the
  source version, review method, and licensed-access posture through owning
  systems.
actual_behavior: |
  The synthetic review path had packet and line-summary refs, but the
  contract/rate source posture was ambiguous. Forge records the recurring
  failure pattern without storing source facts, protected data, rate source
  extracts, or payment details.
context: |
  Sanitized fixture for claims-hybrid-high-dollar-review-v0. Workflow Context
  owns workflow and evidence posture, Readiness owns suitability interpretation,
  Governance owns use/action/export approval and audit readback, and Forge owns
  only incident memory and recurrence learning.

root_cause: "rate_source_pointer_missing_method_and_license_posture"
immediate_fix: |
  Keep the internal-eval and downstream handoff blocked until Workflow Context
  supplies a reviewed rate-source evidence summary and Governance confirms the
  applicable use/action posture.
systemic_takeaway: |
  Claims review incidents need structured issue classes for rate-source
  ambiguity so recurring evidence gaps are visible without copying canonical
  workflow, readiness, governance, or source records into Forge.

