# What happened
failure_type: "integration_failure"
expected_behavior: |
  MCP end-to-end tests against Base Sepolia should reliably pass or
  fail based on code correctness. Infrastructure transience should be
  handled transparently so that CI results reflect actual code quality.
actual_behavior: |
  Public RPC endpoints intermittently timeout with ETIMEDOUT,
  EHOSTUNREACH, and rate-limit (429) errors. E2E tests produce
  false-negative failures unrelated to code changes. This erodes
  trust in the test suite — developers begin ignoring test failures
  because "it's probably just RPC again."
context: |
  Documented in docs/operations/ENGINEERING-RISK-TRACKER.md as
  OPS-001. Detected 2026-02-27. Mitigation added: 5-attempt retry
  with 3-second delays and nested error-cause transient detection
  in mcp/tests/e2e/mcp-e2e.test.ts (lines 72-131). Runtime failover
  via prioritized RPC list (AEGIS_RPC_URLS) also implemented. However,
  the root cause — reliance on public RPC endpoints — remains.
  Dedicated provider endpoints not yet provisioned.

# Resolution
root_cause: "public_infrastructure_dependency"
immediate_fix: |
  Retry logic and runtime failover implemented. CI workflow wired for
  primary/secondary RPC secrets with protected-environment gating.
  Reliability runbook documented.
systemic_takeaway: |
  Test suites that depend on external infrastructure must distinguish
  between code failures and infra failures. When they can't, teams
  develop "retry and ignore" culture that masks real regressions.
  Any CI pipeline hitting external services needs: (1) transient error
  classification, (2) clear reporting of infra vs. code failures,
  (3) a path to dedicated/mocked infrastructure.

