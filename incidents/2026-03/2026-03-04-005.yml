# Classification
project: "scalescore"
agent: "entity-sync"
platform: "claude-code"
severity: "functional"

# What happened
failure_type: "integration_failure"
expected_behavior: |
  When OpsOrchestra (Mila) sends entity data to Scalescore via the
  sync connector, entity types should be correctly resolved regardless
  of whether they arrive as EntityType enum values or raw strings.
  The system should handle both formats transparently.
actual_behavior: |
  Entity type resolution failed when OpsOrchestra passed entity types
  as strings instead of EntityType enums. The entity_repository's
  type handling was inconsistent — some code paths expected enums,
  others expected strings. This caused entity sync failures between
  the two products, breaking the Scalescore assessment pipeline for
  affected entities.
context: |
  Fixed in commit 6c9b5e0 (February 24, 2026). Root cause was that
  entity.type could be either an EntityType enum or a string value,
  and the storage layer didn't normalize before database operations.
  Fix added _entity_type_value() normalization method. 57 lines of
  e2e tests and 22 lines of unit tests added to prevent regression.

# Resolution
root_cause: "type_serialization_mismatch"
immediate_fix: |
  Added _entity_type_value() method to normalize entity type to string
  format before all database operations. Comprehensive test coverage
  added. Fix deployed.
systemic_takeaway: |
  Inter-service data contracts need explicit type definitions at the
  boundary. When two systems (Mila and Scalescore) exchange data,
  both sides must agree on the serialization format — enums vs strings,
  casing conventions, nullable fields. This is a classic integration
  failure that will recur every time USMI products exchange data
  without a shared schema contract. Consider: (1) shared Pydantic
  models for inter-product data exchange, (2) contract testing between
  product APIs, (3) explicit serialization at service boundaries.

