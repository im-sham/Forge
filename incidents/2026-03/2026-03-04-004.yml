# Classification
project: "ghost-sentry"
agent: "pttic-predictor"
platform: "claude-code"
severity: "safety-critical"

# What happened
failure_type: "error_handling_failure"
expected_behavior: |
  The trajectory prediction engine (PTTIC Kalman filter) should handle
  edge cases gracefully: singular matrices during matrix inversion,
  large time gaps between observations, and near-zero speed values.
  In a safety-critical ISR context, prediction failures must be
  surfaced to the operator, not hidden.
actual_behavior: |
  Three compounding issues: (1) np.linalg.inv(S) in the Kalman update
  step will throw LinAlgError if the innovation covariance matrix S is
  singular — no try/except protection, will crash the predictor.
  (2) Large time gaps silently reinitialize the filter state, discarding
  all track history without notifying the operator. (3) Speed threshold
  of 0.1 m/s causes heading oscillation for slow-moving targets near
  the boundary, producing jittery predictions.
context: |
  Found in src/ghost_sentry/core/pttic/predictor.py. The silent filter
  reset (lines 121-127) is particularly concerning in an ISR context —
  an operator tracking a target could see the track "jump" without
  understanding that the system lost continuity. Combined with the
  silent error patterns throughout the codebase (WebSocket errors
  logged but not surfaced, malformed tracks silently skipped in the
  console UI), this creates a pattern where Ghost Sentry's operator
  interface consistently hides system degradation.

# Resolution
root_cause: "missing_edge_case_handling"
immediate_fix: |
  Not yet applied. Recommended: (1) Wrap matrix inversion in try/except
  with fallback to prediction-only (no update) step. (2) Add operator
  notification when filter resets due to time gap. (3) Implement
  hysteresis on speed threshold to prevent heading oscillation.
systemic_takeaway: |
  Safety-critical systems must never silently degrade. This is the same
  "silent fallback" pattern as incident 2026-03-04-001 (Mila's
  PostgresSaver) but with higher stakes. In ISR contexts, a prediction
  that silently loses track history could mean the difference between
  detecting and missing a threat. The pattern: "catch error, log it,
  continue" is acceptable for consumer UX but dangerous for operational
  intelligence systems.

