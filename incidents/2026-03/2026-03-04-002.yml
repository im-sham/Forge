severity: "functional"

# What happened
failure_type: "hallucination"
expected_behavior: |
  When the agent's tool invocation fails (e.g., API timeout, malformed
  parameters), it should return a structured error to the user, offer
  to retry, or escalate. The user should understand what went wrong
  and what their options are.
actual_behavior: |
  Tool invocation failures are caught with a generic exception handler
  that returns raw error text: "ERROR: Tool {tool_name} failed with:
  {exc}". The agent then receives this unstructured error string as
  context and frequently halluccinates a "solution" based on the error
  text rather than requesting a retry or asking for clarification.
  The user sees a confident-sounding but fabricated recovery action.
context: |
  Found in agent/nodes/respond.py (lines 271-273, 379). The exception
  handler logs the failure but converts it to a plain text string that
  gets fed back into the agent's context. The agent treats this as
  informational text rather than a structured error signal, leading to
  confabulated responses. This is compounded by the confidence
  miscalibration pattern — the agent presents its hallucinated fix
  with high confidence.

# Resolution
root_cause: "unstructured_error_propagation"
immediate_fix: |
  Not yet applied. Recommended: return structured error metadata
  (error type, retryable boolean, suggested user action) instead of
  raw exception text. Add a system prompt instruction that on tool
  failure, the agent should acknowledge the failure explicitly rather
  than attempting to reason through raw error output.
systemic_takeaway: |
  When agents receive unstructured error text, they treat it as
  content to reason about rather than a signal to change behavior.
  Error propagation between system components and LLM agents must
  be structured and typed, not string-based. This is likely a
  universal failure mode for any system that feeds exception output
  back into an LLM context window.

